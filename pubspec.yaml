name: expandable_plus
description: >-
  Expandable and collapsible panels with accordion groups for Flutter. A
  maintained, drop-in successor to the expandable package; adds header padding,
  fixes body-tap toggling.
version: 0.2.0
repository: https://github.com/Yusufihsangorgel/expandable_plus
issue_tracker: https://github.com/Yusufihsangorgel/expandable_plus/issues
topics: [expandable, accordion, collapsible, widget, ui]

environment:
  sdk: ^3.9.0
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
